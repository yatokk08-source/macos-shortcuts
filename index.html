<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Shortcuts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // Componentes de ícones (sem usar lucide, vamos com SVG simples)
        const AppleIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
            </svg>
        );

        const FileTextIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="13" x2="8" y2="13"/>
                <line x1="12" y1="17" x2="8" y2="17"/>
            </svg>
        );

        const FolderIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
        );

        const CameraIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        );

        const ZapIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        );

        function MacOSShortcutsInfographic() {
            const [activeCategory, setActiveCategory] = useState('system');

            const shortcuts = {
                system: {
                    icon: AppleIcon,
                    label: 'Sistema',
                    color: 'from-orange-400 to-red-500',
                    bgColor: 'from-orange-500/10 to-red-500/10',
                    borderColor: 'border-orange-500/30 hover:border-orange-500/60',
                    items: [
                        { keys: ['⌘', 'Space'], desc: 'Abre a busca Spotlight' },
                        { keys: ['⌘', 'Tab'], desc: 'Alterna entre aplicativos' },
                        { keys: ['⌘', ','], desc: 'Abre Ajustes do app' },
                        { keys: ['⌥', '⌘', 'Esc'], desc: 'Força encerramento' },
                        { keys: ['⌃', '⌘', 'Q'], desc: 'Bloqueia a tela' },
                    ],
                },
                editing: {
                    icon: FileTextIcon,
                    label: 'Edição & Texto',
                    color: 'from-blue-400 to-cyan-500',
                    bgColor: 'from-blue-500/10 to-cyan-500/10',
                    borderColor: 'border-blue-500/30 hover:border-blue-500/60',
                    items: [
                        { keys: ['⌘', 'C'], desc: 'Copiar' },
                        { keys: ['⌘', 'V'], desc: 'Colar' },
                        { keys: ['⌘', 'X'], desc: 'Recortar' },
                        { keys: ['⌘', 'Z'], desc: 'Desfazer' },
                        { keys: ['⌘', 'A'], desc: 'Selecionar tudo' },
                        { keys: ['⌘', 'F'], desc: 'Buscar texto' },
                        { keys: ['⌥', 'Delete'], desc: 'Apagar palavra anterior' },
                        { keys: ['⌘', '↑/↓'], desc: 'Ir ao início/fim' },
                    ],
                },
                finder: {
                    icon: FolderIcon,
                    label: 'Finder & Arquivos',
                    color: 'from-green-400 to-emerald-500',
                    bgColor: 'from-green-500/10 to-emerald-500/10',
                    borderColor: 'border-green-500/30 hover:border-green-500/60',
                    items: [
                        { keys: ['⌘', 'N'], desc: 'Nova janela/documento' },
                        { keys: ['⌘', 'W'], desc: 'Fecha janela ativa' },
                        { keys: ['⌘', 'M'], desc: 'Minimiza para Dock' },
                        { keys: ['⌘', 'Delete'], desc: 'Move para Lixo' },
                        { keys: ['Space'], desc: 'Quick Look do arquivo' },
                    ],
                },
                screenshot: {
                    icon: CameraIcon,
                    label: 'Capturas de Tela',
                    color: 'from-purple-400 to-pink-500',
                    bgColor: 'from-purple-500/10 to-pink-500/10',
                    borderColor: 'border-purple-500/30 hover:border-purple-500/60',
                    items: [
                        { keys: ['⇧', '⌘', '3'], desc: 'Captura tela inteira' },
                        { keys: ['⇧', '⌘', '4'], desc: 'Captura seleção' },
                        { keys: ['⇧', '⌘', '5'], desc: 'Opções de captura' },
                    ],
                },
            };

            const categories = Object.entries(shortcuts).map(([key, value]) => ({
                id: key,
                ...value,
            }));

            const currentCategory = shortcuts[activeCategory];
            const CurrentIcon = currentCategory.icon;

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 text-slate-900 p-8">
                    {/* Decorative background elements */}
                    <div className="fixed inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-0 right-0 w-96 h-96 bg-orange-300 opacity-5 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-0 left-0 w-96 h-96 bg-blue-300 opacity-5 rounded-full blur-3xl"></div>
                    </div>

                    <div className="relative z-10 max-w-6xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-16">
                            <div className="flex items-center justify-center gap-3 mb-6">
                                <div className="p-3 bg-black rounded-full">
                                    <AppleIcon />
                                </div>
                                <div>
                                    <h1 className="text-5xl font-bold text-slate-900">
                                        macOS Shortcuts
                                    </h1>
                                    <p className="text-slate-500 text-lg mt-2">Atalhos essenciais para dominar seu Mac</p>
                                </div>
                            </div>
                        </div>

                        {/* Category Selector */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-14">
                            {categories.map((cat) => {
                                const Icon = cat.icon;
                                const isActive = activeCategory === cat.id;
                                return (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.id)}
                                        className={`relative p-4 rounded-xl transition-all duration-300 overflow-hidden group ${
                                            isActive
                                                ? `bg-gradient-to-br ${cat.color} text-white shadow-lg`
                                                : 'bg-white border border-slate-200 hover:border-slate-300 hover:shadow-md'
                                        }`}
                                    >
                                        <div className="flex flex-col items-center gap-2">
                                            <div className={isActive ? 'text-white' : 'text-slate-600'}>
                                                <Icon />
                                            </div>
                                            <span className={`text-xs font-semibold text-center ${isActive ? 'text-white' : 'text-slate-700'}`}>
                                                {cat.label}
                                            </span>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Shortcuts Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5 animate-fadeIn">
                            {currentCategory.items.map((shortcut, idx) => (
                                <div
                                    key={idx}
                                    className="group relative"
                                    style={{
                                        animation: `slideUp 0.6s ease-out ${idx * 0.08}s both`,
                                    }}
                                >
                                    {/* Card principal */}
                                    <div className={`relative bg-gradient-to-br ${currentCategory.bgColor} border ${currentCategory.borderColor} rounded-2xl p-6 h-full transition-all duration-300 hover:shadow-lg overflow-hidden`}>
                                        {/* Fundo branco sutil */}
                                        <div className="absolute inset-0 bg-white/40 rounded-2xl opacity-0 group-hover:opacity-30 transition-opacity"></div>

                                        <div className="relative">
                                            {/* Keys Display - estilo macOS */}
                                            <div className="flex flex-wrap gap-2 mb-5">
                                                {shortcut.keys.map((key, keyIdx) => (
                                                    <React.Fragment key={keyIdx}>
                                                        <div className="inline-block">
                                                            <div className={`
                                                                px-3 py-2 rounded-lg font-semibold text-sm
                                                                bg-white shadow-md
                                                                border border-slate-200
                                                                ${currentCategory.color.includes('to-red-500') ? 'text-orange-600' : ''}
                                                                ${currentCategory.color.includes('to-cyan-500') ? 'text-blue-600' : ''}
                                                                ${currentCategory.color.includes('to-emerald-500') ? 'text-green-600' : ''}
                                                                ${currentCategory.color.includes('to-pink-500') ? 'text-purple-600' : ''}
                                                                hover:shadow-lg hover:border-slate-300 transition-all
                                                            `}>
                                                                {key}
                                                            </div>
                                                        </div>
                                                        {keyIdx < shortcut.keys.length - 1 && (
                                                            <span className="text-slate-400 font-light self-center">+</span>
                                                        )}
                                                    </React.Fragment>
                                                ))}
                                            </div>

                                            {/* Description */}
                                            <p className="text-slate-700 text-sm font-medium leading-relaxed">
                                                {shortcut.desc}
                                            </p>

                                            {/* Accent bottom border */}
                                            <div className={`absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r ${currentCategory.color} opacity-0 group-hover:opacity-100 transition-opacity rounded-b-2xl`}></div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Footer Info */}
                        <div className="mt-16 p-6 bg-slate-100 rounded-2xl border border-slate-200">
                            <div className="flex items-start gap-4">
                                <div className="p-3 bg-slate-900 rounded-lg">
                                    <div className="text-yellow-400">
                                        <ZapIcon />
                                    </div>
                                </div>
                                <div>
                                    <h3 className="font-semibold text-slate-900 mb-1">Dica Pro</h3>
                                    <p className="text-slate-600 text-sm">
                                        Segure <span className="font-mono font-semibold text-slate-900">⌘ + ?</span> em muitos aplicativos para ver uma lista completa de atalhos disponíveis. Use <span className="font-mono font-semibold text-slate-900">⌘ + Espaço</span> para acessar Spotlight e procurar qualquer coisa no seu Mac instantaneamente.
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Footer decorativo */}
                        <div className="mt-12 text-center">
                            <p className="text-slate-500 text-xs uppercase tracking-wider">
                                Domine seu Mac com essas combinações de atalhos
                            </p>
                            <div className="mt-6 flex justify-center gap-3">
                                {[...Array(5)].map((_, i) => (
                                    <div
                                        key={i}
                                        className="w-2 h-2 rounded-full bg-gradient-to-r from-orange-400 to-pink-500"
                                        style={{
                                            animation: `bounce 2s ease-in-out ${i * 0.15}s infinite`,
                                            opacity: 0.6,
                                        }}
                                    ></div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* CSS Animations */}
                    <style>{`
                        @keyframes slideUp {
                            from {
                                opacity: 0;
                                transform: translateY(20px);
                            }
                            to {
                                opacity: 1;
                                transform: translateY(0);
                            }
                        }

                        @keyframes bounce {
                            0%, 100% {
                                transform: translateY(0);
                            }
                            50% {
                                transform: translateY(-8px);
                            }
                        }

                        .animate-fadeIn {
                            animation: fadeIn 0.6s ease-out;
                        }

                        @keyframes fadeIn {
                            from {
                                opacity: 0;
                            }
                            to {
                                opacity: 1;
                            }
                        }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MacOSShortcutsInfographic />);
    </script>
</body>
</html>
